<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="pawn的个人学习网站，记录 Linux 入门和 Python 后端学习笔记。" />
    <title>pawn的个人学习网站</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2319553d'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-family='Arial' font-size='20' font-weight='700' fill='white'%3EPW%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="content.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#articles" aria-label="返回文章索引">
        <span class="brand-mark">PW</span>
        <span>
          <strong>pawn的个人学习网站</strong>
          <small>Linux / Python 后端</small>
        </span>
      </a>

      <button class="icon-button" id="themeToggle" type="button" aria-label="切换明暗主题">
        <i data-lucide="sun"></i>
      </button>
    </header>

    <main id="top">
      <section class="section-shell article-workbench" id="articles">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Articles</p>
            <h1>pawn的个人学习网站</h1>
            <p class="page-intro">记录 Linux 入门、Docker/WSL 排障、FastAPI、SQLAlchemy 和 Python 后端项目结构学习笔记。</p>
          </div>
          <label class="search-box">
            <i data-lucide="search"></i>
            <input id="searchInput" type="search" placeholder="搜索 FastAPI、Docker、WSL、Linux..." autocomplete="off" />
          </label>
        </div>

        <div class="article-stats" aria-label="文章统计">
          <span><strong id="articleCount">0</strong> 篇文章</span>
          <span><strong id="vaultNoteCount">0</strong> 篇原始笔记</span>
          <span><strong id="focusCount">0</strong> 个方向</span>
          <span>最近更新 <strong id="lastUpdated">--</strong></span>
        </div>

        <div class="article-layout">
          <aside class="category-panel" aria-label="文章分类">
            <p class="category-title">分类</p>
            <div class="filter-row category-tree" id="filterRow"></div>
          </aside>
          <div class="article-results">
            <div class="article-grid" id="articleGrid" aria-live="polite"></div>
            <p class="empty-state" id="emptyState" hidden>没有匹配的内容，换个关键词试试。</p>
          </div>
        </div>
      </section>

      <section class="section-shell note-detail" id="noteDetail" hidden aria-live="polite">
        <button class="back-button" id="backToArticles" type="button">
          <i data-lucide="arrow-left"></i>
          返回文章索引
        </button>
        <article class="note-paper">
          <div class="article-topline">
            <span class="article-type" id="detailType"></span>
            <time class="article-date" id="detailDate"></time>
          </div>
          <h2 id="detailTitle"></h2>
          <div class="note-meta">
            <span id="detailMinutes"></span>
            <span id="detailSource"></span>
          </div>
          <div class="article-tags" id="detailTags"></div>
          <div class="note-body" id="detailBody"></div>
        </article>
      </section>
    </main>
  </body>
</html>
